name: CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r artifacts/api-server/requirements.txt

      - name: Run Ruff lint
        run: |
          pip install ruff
          ruff check artifacts/api-server/

      - name: Run Pyright type check
        run: |
          pip install pyright
          pyright artifacts/api-server/
